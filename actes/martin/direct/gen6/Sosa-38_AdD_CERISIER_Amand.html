<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📜</text></svg>">
  <title>Acte de décès — CERISIER Amand — 22 janvier 1902</title>

  <link rel="stylesheet" href="/genealogie-site/../../../../css/global.css">
  <link rel="stylesheet" href="/genealogie-site/../../../../css/nav.css">
  <link href="https://fonts.googleapis.com/css2?family=Handlee&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/genealogie-site/../../../../css/actes/deces.css">
</head>

<body>

  <div id="nav-container"></div>

  <div class="print-bar">
    <button class="btn-print" onclick="window.print()">🖨️ Imprimer / Exporter PDF</button>
  </div>

  <div class="a4-wrapper" id="acte-container">
    <p id="loading" style="text-align:center;font-style:italic;color:#888;">Chargement de l'acte…</p>
  </div>

  <script src="/genealogie-site/../../../../js/nav.js"></script>

  <script>
    (function () {

      function esc(v) {
        if (v === null || v === undefined) return '…';
        return String(v)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function fmtDate(j, m, a) {
        if (!a) return '…';
        var mois = ['janvier', 'février', 'mars', 'avril', 'mai', 'juin',
          'juillet', 'août', 'septembre', 'octobre', 'novembre', 'décembre'];
        var mm = m ? mois[m - 1] : null;
        if (j && mm) return j + ' ' + mm + ' ' + a;
        if (mm) return mm + ' ' + a;
        return String(a);
      }

      function fmtHeure(h) {
        if (!h) return '…';
        return h.replace('H', ' h ');
      }

      function fmtPrenom(arr) {
        if (!arr || !arr.length) return '…';
        return arr.join(' ');
      }

      function fmtStatut(s) {
        if (!s) return '';
        return ' (' + s + ')';
      }

      function blockNorm(label, value) {
        return '<div class="norm-block">'
          + '<b>' + esc(label) + '</b>'
          + '<span>' + (value || '…') + '</span>'
          + '</div>';
      }

      function blockNormFull(label, value) {
        return '<div class="norm-block norm-full">'
          + '<b>' + esc(label) + '</b>'
          + '<span>' + (value || '…') + '</span>'
          + '</div>';
      }

      var JSON_PATH = '../../../../data/actes/deces/martin_direct.json';
      var ACTE_ID = 'AdD-Sosa_38';

      fetch(JSON_PATH)
        .then(function (r) {
          if (!r.ok) throw new Error('Impossible de charger le JSON (' + r.status + ')');
          return r.json();
        })
        .then(function (data) {
          var acte = null;
          for (var i = 0; i < data.length; i++) {
            if (data[i].acte_id === ACTE_ID) { acte = data[i]; break; }
          }
          if (!acte) throw new Error('Acte ' + ACTE_ID + ' introuvable dans le JSON.');
          render(acte);
        })
        .catch(function (err) {
          document.getElementById('loading').innerHTML =
            '<b style="color:red">Erreur : ' + esc(err.message) + '</b>';
        });

      function render(a) {
        var p = a.personne;
        var pere = a.pere_defunt;
        var mere = a.mere_defunt;
        var conj = a.conjoint;
        var dec = a.declarants || [];
        var maire = (a.maire_officier && a.maire_officier[0]) ? a.maire_officier[0] : null;
        var src = a.source;

        var naissance_estimee = (p.annee_deces && p.age) ? (p.annee_deces - p.age) : null;

        var decl1_html = '…';
        if (dec.length > 0) {
          var d = dec[0];
          decl1_html = esc(d.nom) + ' ' + esc(fmtPrenom(d.prenoms))
            + ', ' + esc(d.age) + ' ans, ' + esc(d.profession)
            + ', domicilié à ' + esc(d.lieu_domicile_mention_affiche || d.lieu_domicile_mention);
        }

        var decl2_html = 'DRAPEAU Louis, 32 ans, charron, domicilié à '
          + esc(a.lieu_declaration_affiche)
          + '<br><em>(non présent dans la base — saisi en dur)</em>';

        var maire_nom = maire
          ? (esc(maire.nom) + ' ' + esc(fmtPrenom(maire.prenoms)))
          : '…';

        var html = '';

        /* ── EN-TÊTE ── */
        html += '<div class="acte-header">';
        html += '<h1>Acte de décès n°' + esc(src.acte_numero) + '</h1>';
        html += '<h2>' + esc(a.lieu_declaration)
          + ' (canton de ' + esc(a.canton_declaration) + ') – '
          + esc(a.dept_declaration) + '</h2>';
        html += '<h3>Décès de ' + esc(p.nom) + ' ' + esc(fmtPrenom(p.prenoms))
          + ' — ' + esc(fmtDate(a.jour_declaration, a.mois_declaration, a.annee_declaration)) + '</h3>';
        html += '</div>';

        /* ══ 1. TRANSCRIPTION DIPLOMATIQUE ══ */
        html += '<div class="section">';
        html += '<h2>1) Transcription diplomatique fidèle</h2>';
        html += '<div class="pre">'
          + '(marge:) N° ' + esc(src.acte_numero) + ' Décès\n'
          + '(marge:) ' + esc(p.nom) + ' ' + esc(fmtPrenom(p.prenoms)) + '\n'
          + '(marge:) épouse Adèle ' + esc(conj ? conj.nom : '…') + '\n'
          + '(marge:) ' + esc(a.jour_declaration) + ' janvier – ' + esc(p.age) + ' ans\n\n'
          + "L'an mil neuf Cent Deux le vingt-Deux janvier, à neuf heures Du matin par\n"
          + "Devant nous du Bouchet Edgard, conseiller D'arrondissement, Maire et officier\n"
          + "De l'état civil De la commune De " + esc(a.lieu_declaration) + ', canton De ' + esc(a.canton_declaration) + ',\n'
          + 'arrondissement De ' + esc(a.arrondissement_declaration) + ', Département De ' + esc(a.dept_declaration) + ', ont comparu Delhumeau Tibere-Elie\n'
          + 'âgé De quarante-huit ans, tonnelier, et Drapeau Louis, âgé De trente-Deux ans,\n'
          + 'charron, tous Deux Domiciliés en cette commune, et voisins Du Décédé ci-après Dé-\n'
          + 'signé, lesquels nous ont Déclaré que ' + esc(p.nom) + ' ' + esc(fmtPrenom(p.prenoms)) + ', âgé De soixante-seize ans,\n'
          + 'cultivateur, né en cette commune, et y Domicilié ' + esc(p.adresse_deces) + ', fils Des feus\n'
          + esc(pere ? pere.nom : '…') + ' ' + esc(pere ? fmtPrenom(pere.prenoms) : '') + ' et '
          + esc(mere ? fmtPrenom(mere.prenoms) : '…') + ' ' + esc(mere ? mere.nom : '') + ', époux De '
          + esc(conj ? fmtPrenom(conj.prenoms) : '…') + ' ' + esc(conj ? conj.nom : '') + ', cultivatrice, était\n'
          + "Décédé ce matin, à quatre heures et Demie, en son susdit Domicile ; et après nous\n"
          + "être assuré De ce Décès, nous en avons Dressé le présent acte que les Deux compa-\n"
          + "rants ont signé avec nous, après lecture faite\n\n"
          + 'Signatures : Delhumeau Tibère, L. Drapeau, Le ' + esc(maire ? maire.nom : '') + ' (maire)'
          + '</div>';
        html += '</div>';

        /* ══ 2. VERSION NORMALISÉE ══ */
        html += '<div class="section">';
        html += '<h2>2) Version normalisée (lecture moderne)</h2>';

        html += '<h3>📋 Déclaration — '
          + esc(fmtDate(a.jour_declaration, a.mois_declaration, a.annee_declaration))
          + ' à ' + esc(fmtHeure(a.heure_declaration)) + '</h3>';
        html += '<div class="norm-grid">';
        html += blockNorm('Commune', esc(a.lieu_declaration_affiche));
        html += blockNorm('Canton / Arrondissement', esc(a.canton_declaration) + ' / ' + esc(a.arrondissement_declaration));
        html += blockNorm('Département', esc(a.dept_declaration));
        html += blockNorm('Pays', esc(a.pays_declaration));
        html += '</div>';

        html += '<h3>⚰️ Défunt</h3>';
        html += '<div class="norm-grid">';
        html += blockNorm('Nom &amp; Prénom', '<strong>' + esc(p.nom) + ' ' + esc(fmtPrenom(p.prenoms)) + '</strong>');
        html += blockNorm('Profession', esc(p.profession));
        html += blockNorm('Décès le', esc(fmtDate(p.jour_deces, p.mois_deces, p.annee_deces)) + ' à ' + esc(fmtHeure(p.heure_deces)));
        html += blockNorm('Lieu de décès', esc(p.lieu_deces_affiche) + (p.adresse_deces ? ' — ' + esc(p.adresse_deces) : ''));
        html += blockNorm('Âge au décès', (p.age || '…') + ' ans');
        html += blockNorm('Naissance estimée', naissance_estimee ? '~ ' + naissance_estimee + ' (calculée)' : '…');
        html += blockNorm('Lieu de naissance (mention)', esc(p.lieu_naissance_mention_affiche));
        html += blockNorm('Domicile', esc(p.lieu_domicile_affiche) + (p.adresse_domicile ? ' — ' + esc(p.adresse_domicile) : ''));
        html += '</div>';

        html += '<h3>👨‍👩‍👦 Filiation</h3>';
        html += '<div class="norm-grid">';
        html += blockNorm('Père',
          esc(pere ? pere.nom + ' ' + fmtPrenom(pere.prenoms) : '…')
          + fmtStatut(pere ? pere.statut : null));
        html += blockNorm('Mère',
          esc(mere ? fmtPrenom(mere.prenoms) + ' ' + mere.nom : '…')
          + fmtStatut(mere ? mere.statut : null));
        html += '</div>';

        html += '<h3>💍 Conjoint</h3>';
        html += '<div class="norm-grid">';
        html += blockNorm('Épouse',
          esc(conj ? conj.nom + ' ' + fmtPrenom(conj.prenoms) : '…')
          + fmtStatut(conj ? conj.statut : null));
        html += blockNorm('Profession', esc(conj ? conj.profession : '…'));
        html += '</div>';

        html += '<h3>🧑‍💼 Déclarants</h3>';
        html += '<div class="norm-grid">';
        html += blockNormFull('1er déclarant', decl1_html);
        html += blockNormFull('2e déclarant', decl2_html);
        html += '</div>';

        html += '<h3>🏛️ Officier d\'état civil</h3>';
        html += '<div class="norm-grid">';
        if (maire) {
          html += blockNorm('Maire', esc(maire.nom) + ' ' + esc(fmtPrenom(maire.prenoms)));
          html += blockNorm('Fonction', esc(maire.profession));
          html += blockNorm('Commune', esc(maire.lieu_fonction_affiche));
          html += blockNorm('Canton / Arrondissement', esc(maire.canton_fonction) + ' / ' + esc(maire.arrondissement_fonction));
        } else {
          html += blockNorm('Maire', '…');
        }
        html += '</div>';

        html += '<h3>✍️ Signatures</h3>';
        html += '<div class="norm-grid">';
        html += blockNormFull('Signataires',
          'Delhumeau Tibère &nbsp;•&nbsp; L. Drapeau &nbsp;•&nbsp; Le ' + maire_nom + ' (maire)');
        html += '</div>';

        html += '</div>';

        /* ══ 3. ANNOTATIONS ══ */
        html += '<div class="section">';
        html += '<h2>3) Annotations &amp; Observations paléographiques</h2>';
        html += '<ul class="annot-list">';
        html += '<li><strong>Graphie du patronyme de la mère</strong> : l\'acte porte <em>« Louise Amant »</em>.'
          + ' Le JSON normalise en <strong>AMANT</strong>. La variante <strong>AMAND</strong>'
          + ' (prénom du défunt !) est possible par confusion graphique ; à vérifier sur d\'autres actes.'
          + ' Niveau de confiance : <em>moyen</em>.</li>';
        html += '<li><strong>Prénom du père</strong> : l\'acte porte <em>« Noël »</em> ; le JSON normalise'
          + ' <em>Noël-Jean</em> (à confirmer par son propre acte de naissance ou de mariage).</li>';
        html += '<li><strong>COMBAT / COMBA T</strong> : graphie du patronyme de l\'épouse à surveiller —'
          + ' une séparation graphique entre <em>COMBA</em> et <em>T</em> peut apparaître selon les greffiers.</li>';
        html += '<li><strong>2e déclarant (DRAPEAU Louis)</strong> : absent du JSON — à intégrer si une fiche individu lui est créée.</li>';
        html += '<li><strong>Naissance estimée</strong> : ~ ' + (naissance_estimee || '?')
          + ' (calculée : ' + esc(p.annee_deces) + ' − ' + esc(p.age) + ').'
          + ' Aucune date de naissance explicite dans l\'acte.</li>';
        html += '<li><strong>Lieu-dit « au Sablon »</strong> : hameau de Faye-d\'Anjou, vérifié sur IGN / Géoportail.</li>';
        html += '<li><strong>Majuscules systématiques</strong> sur les initiales de mots courants (Du, De, Deux, Dressé…) :'
          + ' habitude graphique constante du greffier DU BOUCHET.</li>';
        html += '</ul>';
        html += '</div>';

        /* ══ 4. SOURCES ══ */
        html += '<div class="section">';
        html += '<h2>4) Sources externes</h2>';
        html += '<ul class="sources-list">';
        html += '<li><strong>Archives départementales du Maine-et-Loire (AD49)</strong>';
        html += '<ul>';
        html += '<li>Commune : ' + esc(src.commune) + '</li>';
        html += '<li>Type de registre : ' + esc(src.registre) + '</li>';
        html += '<li>Années : ' + esc(src.periode ? src.periode.join('–') : '…') + '</li>';
        html += '<li>Pages : ' + esc(src.pages) + ' — Vue : ' + esc(src.vue ? src.vue.join(', ') : '…') + '</li>';
        html += '<li>Acte n° : ' + esc(src.acte_numero) + '</li>';
        html += '<li>Collection : ' + esc(src.collection) + '</li>';
        html += '<li>Cote microfilm : ' + esc(src.cote_1) + '</li>';
        html += '<li>Cote original : ' + esc(src.cote_2) + '</li>';
        html += '<li>Permalien : <a href="/genealogie-site/https://recherche-archives.maine-et-loire.fr/ark:71821/be0d28eaf8b7b64c895f224a43679bc5.fiche=arko_fiche_6822ebf15f594.moteur=arko_default_6825f9c6950b1">AD49 — permalien de l\'acte</a></li>';
        html += '</ul>';
        html += '</li>';
        html += '</ul>';

        html += '<img src="../../../../img/actes/martin/direct/gen6/Sosa-38_AdD_CERISIER_Amand.jpg"'
          + ' alt="Image de l\'acte — CERISIER Amand — AD49">';

        html += '<ul class="sources-list">';
        html += '<li><strong>Période de mandat du maire</strong> : en fonction en 1884 (à 1919)'
          + ' — <a href="https://fr.wikipedia.org/wiki/Faye-d%27Anjou">Wikipédia — Faye-d\'Anjou</a></li>';
        html += '<li>IGN – Lieux-dits et hameaux : <a href="https://www.geoportail.gouv.fr">Géoportail</a></li>';
        html += '<li><strong>Historique des communes</strong> : Faye (1793–1801) → Faye-d\'Anjou (1923) → Bellevigne-en-Layon (fusion 01/01/2016)';
        html += '<ul>';
        html += '<li><a href="https://fr.wikipedia.org/wiki/Faye-d%27Anjou">Wikipédia — Faye-d\'Anjou</a></li>';
        html += '<li><a href="https://fr.wikipedia.org/wiki/Bellevigne-en-Layon">Wikipédia — Bellevigne-en-Layon</a></li>';
        html += '<li><a href="https://www.wiki-anjou.fr/index.php/Faye-d%27Anjou">Wiki-Anjou — Faye-d\'Anjou</a></li>';
        html += '<li><a href="https://www.wiki-anjou.fr/index.php/Bellevigne-en-Layon">Wiki-Anjou — Bellevigne-en-Layon</a></li>';
        html += '<li><a href="https://fr.geneawiki.com/wiki/49_-_Faye-d%27Anjou">Geneawiki — Faye-d\'Anjou</a></li>';
        html += '<li><a href="https://fr.geneawiki.com/wiki/49345_-_Bellevigne-en-Layon">Geneawiki — Bellevigne-en-Layon</a></li>';
        html += '</ul>';
        html += '</li>';
        html += '</ul>';

        html += '</div>';

        /* ── Injection ── */
        var loading = document.getElementById('loading');
        if (loading) loading.remove();
        document.getElementById('acte-container').insertAdjacentHTML('beforeend', html);
      }

    })();
  </script>

</body>

</html>
