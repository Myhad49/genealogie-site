<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Fiche individu — Généalogie</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Georgia, serif; background: #f5f0eb; color: #2c1810; }

    header {
      background: #2c1810; color: #f5f0eb;
      padding: 1.5rem 2rem;
    }
    header a { color: #d4a96a; text-decoration: none; font-size: 0.9rem; }
    header h1 { font-size: 1.4rem; margin-top: 0.3rem; }

    .container { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }

    .fiche {
      background: #fff;
      border: 1px solid #d4a96a;
      border-radius: 4px;
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .fiche h2 { font-size: 1.8rem; margin-bottom: 0.5rem; }
    .sosa { color: #d4a96a; font-size: 1rem; }

    .infos {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
      margin: 1.5rem 0;
    }

    .info-bloc { border-left: 3px solid #d4a96a; padding-left: 0.75rem; }
    .info-label { font-size: 0.75rem; text-transform: uppercase;
                  letter-spacing: 0.05em; color: #999; }
    .info-val { font-size: 1rem; font-weight: bold; }

    h3 {
      font-size: 1.1rem;
      border-bottom: 1px solid #d4a96a;
      padding-bottom: 0.5rem;
      margin: 1.5rem 0 1rem;
    }

    .acte-ligne {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      border: 1px solid #e0d5c5;
      border-radius: 4px;
      margin-bottom: 0.5rem;
      background: #faf7f2;
    }

    .acte-type {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 3px;
      font-size: 0.75rem;
      font-weight: bold;
      text-transform: uppercase;
      margin-right: 0.5rem;
    }

    .type-Naissance { background: #d4edda; color: #155724; }
    .type-Mariage   { background: #cce5ff; color: #004085; }
    .type-Décès     { background: #f8d7da; color: #721c24; }

    .btn {
      padding: 0.35rem 0.8rem;
      background: #2c1810;
      color: #f5f0eb;
      border-radius: 4px;
      text-decoration: none;
      font-size: 0.85rem;
    }
    .btn:hover { background: #d4a96a; color: #2c1810; }

    .vide { text-align: center; padding: 3rem; color: #999; font-style: italic; }
  </style>
</head>
<body>

<header>
  <a href="/genealogie-site/recherche.html">← Retour à la recherche</a>
  <h1 id="header-titre">Fiche individu</h1>
</header>

<div class="container" id="contenu">
  <p class="vide">Chargement…</p>
</div>

<script src="/genealogie-site/js/individu.js"></script>
</body>
</html>
